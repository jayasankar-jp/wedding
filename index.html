<!doctype html>
<html>
  <head>
    <title>Decrypt & Redirect</title>

    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .card {
        background: white;
        padding: 30px;
        border-radius: 15px;
        width: 350px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        text-align: center;
        animation: fadeIn 0.6s ease-in-out;
      }

      h1 {
        font-size: 22px;
        margin-bottom: 10px;
        color: #333;
      }

      h2 {
        font-size: 16px;
        margin-bottom: 20px;
        color: #666;
      }

      label {
        font-size: 13px;
        color: #555;
        display: block;
        text-align: left;
        margin-top: 10px;
      }

      input,
      textarea {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 8px;
        border: 1px solid #ddd;
        outline: none;
        transition: 0.3s;
      }

      input:focus,
      textarea:focus {
        border-color: #667eea;
        box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
      }

      button {
        margin-top: 20px;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.03);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .footer {
        margin-top: 15px;
        font-size: 12px;
        color: #999;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>💍 Happy Married Life</h1>
      <h2>🔓 Decrypt Your Link</h2>

      <label>Secret Key</label>
      <input type="text" id="key" placeholder="Enter your key..." />

      <label>Encrypted Data</label>
      <textarea
        id="data"
        rows="4"
        placeholder="Paste encrypted text..."
      ></textarea>

      <button onclick="decrypt()">Decrypt & Redirect 🚀</button>

      <div class="footer">Secure Link Access</div>
    </div>

    <script>
      function getQueryParam(name) {
        let urlParams = new URLSearchParams(window.location.search)
        return urlParams.get(name)
      }

      window.onload = function () {
        let data = getQueryParam("data")
        if (data) {
          document.getElementById("data").value = data
        }
      }

      function decrypt() {
        var key = document.getElementById("key").value
        var encrypted = document.getElementById("data").value

        try {
          var bytes = CryptoJS.AES.decrypt(encrypted, key)
          var originalText = bytes.toString(CryptoJS.enc.Utf8)

          if (!originalText) {
            alert("❌ Wrong Key or Invalid Data")
            return
          }

          window.location.href = originalText
        } catch (e) {
          alert("Error decrypting data")
        }
      }
    </script>
  </body>
</html>
